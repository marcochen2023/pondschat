name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Validate project structure
      run: |
        echo "Validating project structure..."
        ls -la
        echo "Checking public directory..."
        ls -la public/
        echo "Checking JS files..."
        ls -la public/js/
        echo "Checking CSS files..."
        ls -la public/css/

    - name: Check for required files
      run: |
        echo "Checking required files..."
        test -f public/index.html || exit 1
        test -f public/js/app.js || exit 1
        test -f public/js/db.js || exit 1
        test -f public/js/p2p.js || exit 1
        test -f SKILL.md || exit 1
        test -f ARCHITECTURE.md || exit 1
        echo "All required files present!"

  lint:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install ESLint
      run: npm install -g eslint

    - name: Run ESLint on JS files
      run: |
        # Basic syntax check using node
        for file in public/js/*.js; do
          echo "Checking $file..."
          node --check "$file" || echo "Syntax error in $file"
        done

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create deployment info
      run: |
        echo "PondsChat v1.0.0 - Ready for deployment"
        echo "Build completed at: $(date)"
